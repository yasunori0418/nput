name: Test

on:
  workflow_dispatch:
  # No `paths` trigger: the workflow starts on every PR so the required status
  # checks always report. Relevant-change detection moved into the `changes`
  # job, which skips flake-check / e2e on docs-only PRs (skipped == success for
  # required checks). The old "run nix only when nix/Go/CI files change"
  # optimisation is preserved via the `if:` gate (→ ADR-0027 §2, ADR-0030).
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.detect.outputs.run }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect relevant changes
        id: detect
        uses: ./.github/actions/changes

  flake-check:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Run nix flake check
        run: nix flake check -L

  e2e:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    # Non-NixOS (ubuntu-latest) E2E. Verifies the "works as long as nix is present"
    # claim with real nix (→ ADR-0012). Runs tests/e2e/run.sh inside the ci devShell
    # (nput / git / jq / coreutils).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Run E2E harness
        run: nix develop '.?dir=dev#ci' -c tests/e2e/run.sh
